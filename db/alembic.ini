# Alembic configuration file for pf9-mngt schema migrations
# Connection URL is injected by env.py from environment variables —
# this placeholder is never used directly.
[alembic]
script_location = db/alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(slug)s
timezone = UTC
truncate_slug_length = 40
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
