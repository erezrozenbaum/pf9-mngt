worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Upstream definitions ─────────────────────────────────────────────────
    upstream pf9_api {
        server pf9_api:8000;
    }

    upstream pf9_monitoring {
        server pf9_monitoring:8001;
    }

    upstream pf9_ui {
        # Production nginx build (Dockerfile.prod) serves on port 80
        server pf9_ui:80;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS / TLS termination ──────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 50m;

        # ── Shared proxy headers — inherited by all location blocks ──────────
        # Host is rewritten to "localhost" so FastAPI's TrustedHostMiddleware
        # accepts requests regardless of the external IP/hostname used by clients.
        # X-Forwarded-Host preserves the original host for app-level logging.
        proxy_set_header Host              localhost;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;

        # ── Monitoring service (pf9_monitoring:8001) ─────────────────────────
        # Handles: /metrics/vms  /metrics/hosts  /metrics/alerts
        #          /metrics/summary  /metrics/refresh
        # ^~ disables regex matching so this prefix wins over the regex block below.
        location ^~ /metrics/ {
            proxy_pass http://pf9_monitoring;
        }

        # ── API: path-tree prefixes (routers with sub-paths) ─────────────────
        location /api/           { proxy_pass http://pf9_api; }
        location /auth/          { proxy_pass http://pf9_api; }
        location /admin/         { proxy_pass http://pf9_api; }
        location /settings/      { proxy_pass http://pf9_api; }
        location /dashboard/     { proxy_pass http://pf9_api; }
        location /notifications/ { proxy_pass http://pf9_api; }
        location /monitoring/    { proxy_pass http://pf9_api; }
        location /history/       { proxy_pass http://pf9_api; }
        location /audit/         { proxy_pass http://pf9_api; }
        location /drift/         { proxy_pass http://pf9_api; }
        location /tenant-health/ { proxy_pass http://pf9_api; }
        location /user/          { proxy_pass http://pf9_api; }

        # ── API: top-level resource routes and utility paths ─────────────────
        # Regex covers every first-level path segment exposed by the FastAPI app.
        # /metrics (exact, no slash) → pf9_api Prometheus endpoint.
        # /metrics/ (trailing slash) → pf9_monitoring above (higher priority).
        # ── Static files served by the API (uploaded logos, etc.) ──────────────
        location /static/ {
            proxy_pass http://pf9_api;
        }

        # ── Snapshot Restore routes ──────────────────────────────────────────
        location /restore/ {
            proxy_pass http://pf9_api;
        }

        # ── API: top-level resource routes and utility paths ─────────────────
        # Regex covers every first-level path segment exposed by the FastAPI app.
        # /metrics (exact, no slash) → pf9_api Prometheus endpoint.
        # /metrics/ (trailing slash) → pf9_monitoring above (higher priority).
        location ~ ^/(domains|tenants|projects|servers|volumes|volumes-with-metadata|snapshots|networks|subnets|ports|floatingips|flavors|security-groups|security-group-rules|images|hypervisors|keypairs|host-aggregates|volume-types|server-groups|project-quotas|users|roles|user-activity-summary|role-assignments|os-distribution|demo-mode|health|metrics|docs|redoc|openapi\.json)(/.*)?$ {
            proxy_pass http://pf9_api;
        }

        # ── React SPA — everything else ───────────────────────────────────────
        location / {
            proxy_pass http://pf9_ui;
        }
    }
}
