server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy to tenant-portal backend.
    # Template placeholder — resolved at container startup by envsubst.
    # Docker Compose: TENANT_PORTAL_UPSTREAM defaults to "tenant_portal:8010" (Dockerfile CMD default)
    # Kubernetes:     TENANT_PORTAL_UPSTREAM is set to "pf9-tenant-portal:8010" via Helm env var
    location /tenant/ {
        proxy_pass         http://${TENANT_PORTAL_UPSTREAM}/tenant/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA fallback — all non-asset routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (content-hashed filenames from Vite build)
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
