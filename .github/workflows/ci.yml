name: CI

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Python syntax & static analysis
  # Catches broken imports, syntax errors, and undefined names.
  # Runs in seconds with no dependencies on secrets or live services.
  # -------------------------------------------------------------------------
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install flake8

      - name: Syntax check — all Python files
        run: |
          echo "=== Python syntax check ==="
          find . -name "*.py" \
            -not -path "./.venv/*" \
            -not -path "./__pycache__/*" \
            -not -path "./*/node_modules/*" \
            | xargs python -m py_compile
          echo "All files pass syntax check."

      - name: Flake8 — critical errors only (E9, F63, F7, F82)
        run: |
          # E9xx  : syntax errors that prevent compilation
          # F63x  : invalid escape sequences / assert misuse
          # F7xx  : syntax / statement errors
          # F82x  : undefined names (catches missing imports before runtime)
          flake8 . \
            --select=E9,F63,F7,F82 \
            --exclude=.venv,__pycache__,node_modules,pf9-ui \
            --count \
            --show-source \
            --statistics

  # -------------------------------------------------------------------------
  # Job 2: Docker Compose config validation
  # Verifies the compose files parse cleanly and all image/context references
  # resolve — catches typos in service names, missing build contexts, etc.
  # -------------------------------------------------------------------------
  compose-validate:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create stub .env (required for compose config to parse)
        run: |
          cp .env.example .env 2>/dev/null || cat > .env << 'EOF'
          PF9_AUTH_URL=http://stub
          PF9_TENANT=stub
          PF9_USERNAME=stub
          PF9_PASSWORD=stub
          PF9_REGION=stub
          PF9_DB_HOST=stub
          PF9_DB_PORT=5432
          PF9_DB_NAME=stub
          PF9_DB_USER=stub
          PF9_DB_PASSWORD=stub
          LDAP_ADMIN_PASSWORD=stub
          JWT_SECRET_KEY=stub-secret-for-ci-only-not-real
          SMTP_HOST=stub
          SMTP_PORT=587
          SMTP_USER=stub
          SMTP_PASS=stub
          EOF

      - name: Validate base compose
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate prod compose overlay
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet

  # -------------------------------------------------------------------------
  # Job 3: Integration tests (live-stack)
  # NOTE: These require a real PF9 endpoint + seeded DB and are NOT run in
  # standard CI. Run them manually before merging to master:
  #
  #   docker cp test_ticket_system.py pf9_api:/tmp/
  #   docker exec pf9_api python /tmp/test_ticket_system.py
  #
  # A future sprint will wire these up against a docker-compose test stack
  # using GitHub Actions services + seeded test data (Phase O4 / Phase F1).
  # -------------------------------------------------------------------------

  # -------------------------------------------------------------------------
  # Job 4: Unit tests (no live stack required)
  # Runs tests/test_health.py against a live API (skipped in CI since there
  # is no stack) and the pure JWT unit tests which need no services at all.
  # The health/metrics integration tests are skipped automatically unless
  # the stack is reachable; JWT unit tests always run.
  # -------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests (no live stack)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest python-jose requests

      - name: Run JWT unit tests
        run: python -m pytest tests/test_auth.py::TestJWTHelpers -v

      - name: Run container watchdog unit tests
        run: python -m pytest tests/test_container_alerts.py -k "not TestContainerAlertAPI" -v


  # -------------------------------------------------------------------------
  # Job 5: Integration tests (full live stack)
  # Spins up docker compose, waits for all services to become healthy, runs
  # seed_ci.py to verify the CI admin can log in, then runs the full test
  # suite. Tears down on completion regardless of result.
  # -------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests (live stack)
    runs-on: ubuntu-latest
    needs: [lint, compose-validate, unit-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest python-jose requests

      - name: Copy CI environment file
        run: cp .env.ci .env

      - name: Generate per-run CI admin password
        # A fresh random password is generated each run and written into .env.
        # Nothing password-like is ever committed to the repository.
        run: |
          CI_PASS="ci-run-$(openssl rand -hex 16)"
          echo "DEFAULT_ADMIN_PASSWORD=${CI_PASS}" >> .env
          echo "CI_ADMIN_PASS=${CI_PASS}" >> "$GITHUB_ENV"

      - name: Create secret files for Docker Compose (from .env values)
        # Extract the actual values from .env so the secret files match exactly
        # what PostgreSQL and the other services are initialised with.
        run: |
          mkdir -p secrets
          grep '^POSTGRES_PASSWORD='   .env | cut -d'=' -f2- > secrets/db_password
          grep '^LDAP_ADMIN_PASSWORD=' .env | cut -d'=' -f2- > secrets/ldap_admin_password
          grep '^PF9_PASSWORD='        .env | cut -d'=' -f2- > secrets/pf9_password
          grep '^JWT_SECRET_KEY='      .env | cut -d'=' -f2- > secrets/jwt_secret

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for pf9_api to be healthy (up to 3 minutes)
        run: |
          echo "Waiting for pf9_api healthcheck..."
          timeout 180 bash -c \
            "until docker inspect --format='{{.State.Health.Status}}' pf9_api 2>/dev/null | grep -q '^healthy$'; do
               echo '  still waiting...'; sleep 8
             done"
          echo "pf9_api is healthy."

      - name: Wait for pf9_monitoring to be healthy (up to 90 seconds)
        run: |
          echo "Waiting for pf9_monitoring healthcheck..."
          timeout 90 bash -c \
            "until docker inspect --format='{{.State.Health.Status}}' pf9_monitoring 2>/dev/null | grep -q '^healthy$'; do
               echo '  still waiting...'; sleep 5
             done" || echo "pf9_monitoring did not become healthy (non-fatal)"

      - name: Show container status
        run: docker compose ps

      - name: Seed check — verify CI admin login
        env:
          TEST_API_URL: http://localhost:8000
          TEST_MON_URL: http://localhost:8001
          DEFAULT_ADMIN_USER: ci-admin
          DEFAULT_ADMIN_PASSWORD: ${{ env.CI_ADMIN_PASS }}
        run: python tests/seed_ci.py

      - name: Run full test suite
        env:
          TEST_API_URL: http://localhost:8000
          TEST_MON_URL: http://localhost:8001
          TEST_ADMIN_EMAIL: ci-admin
          TEST_ADMIN_PASSWORD: ${{ env.CI_ADMIN_PASS }}
          TEST_SUPERADMIN_USER: ci-admin
          TEST_SUPERADMIN_PASSWORD: ${{ env.CI_ADMIN_PASS }}
          TEST_VERIFY_SSL: "false"
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/seed_ci.py \
            -k "not TestContainerAlertAPI or (TestContainerAlertAPI and not test_put_requires_superadmin)"

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== pf9_api logs (last 100 lines) ==="
          docker compose logs --tail=100 pf9_api
          echo "=== pf9_monitoring logs (last 50 lines) ==="
          docker compose logs --tail=50 pf9_monitoring
          echo "=== pf9_db logs (last 50 lines) ==="
          docker compose logs --tail=50 db

      - name: Tear down stack
        if: always()
        run: docker compose down -v
