name: Create Release Tag

# Triggers after the CI workflow completes on master/main.
# The release is only created when CI passes (all jobs including integration tests).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, main]

jobs:
  release:
    # Only run when the CI workflow that triggered this actually succeeded
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.changelog.outputs.tag }}
      tag_created: ${{ steps.create-tag.outcome == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from CHANGELOG.md
        id: changelog
        run: |
          # Parse the latest version from CHANGELOG.md
          VERSION=$(grep -oP '## \[\K\d+\.\d+\.\d+' CHANGELOG.md | head -1)
          if [ -z "$VERSION" ]; then
            echo "No version found in CHANGELOG.md"
            exit 1
          fi

          TAG="v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Will create tag: $TAG"
          fi

          # Extract changelog section for release notes
          # Get content between this version header and the next version header
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          # Write multi-line output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        id: create-tag
        if: steps.changelog.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.changelog.outputs.tag }} -m "Release ${{ steps.changelog.outputs.tag }}"
          git push origin ${{ steps.changelog.outputs.tag }}

      - name: Create GitHub Release
        if: steps.changelog.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: Release ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false

  # ---------------------------------------------------------------------------
  # Publish Docker images to GitHub Container Registry (ghcr.io).
  # Only runs when a new release tag is actually created by the job above.
  # Builds linux/amd64 and linux/arm64 images for all custom services.
  # ---------------------------------------------------------------------------
  publish-images:
    name: Publish Docker Images to ghcr.io
    needs: [release]
    if: needs.release.outputs.tag_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .
            dockerfile: api/Dockerfile
          - service: ui
            context: ./pf9-ui
            dockerfile: pf9-ui/Dockerfile.prod
          - service: monitoring
            context: ./monitoring
            dockerfile: monitoring/Dockerfile
          - service: backup-worker
            context: ./backup_worker
            dockerfile: backup_worker/Dockerfile
          - service: metering-worker
            context: ./metering_worker
            dockerfile: metering_worker/Dockerfile
          - service: scheduler-worker
            context: .
            dockerfile: scheduler_worker/Dockerfile
          - service: search-worker
            context: ./search_worker
            dockerfile: search_worker/Dockerfile
          - service: notification-worker
            context: ./notifications
            dockerfile: notifications/Dockerfile
          - service: nginx
            context: ./nginx
            dockerfile: nginx/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (enables ARM64 emulation on the AMD64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pf9-mngt-${{ matrix.service }}:${{ needs.release.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/pf9-mngt-${{ matrix.service }}:latest
