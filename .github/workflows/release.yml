name: Release

# Triggers after the CI workflow completes successfully on master/main.
# Flow: extract version → build & push Docker images → create GitHub release.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, main]

# ---------------------------------------------------------------------------
# Workflow-level configuration variables.
# Set these in: GitHub → repo Settings → Secrets and variables → Variables
#
#   DEPLOY_REPO   — name of the private deploy repo that holds values.prod.yaml
#                   and sealed-secret manifests (e.g. pf9-mngt-deploy)
# ---------------------------------------------------------------------------
env:
  DEPLOY_REPO: ${{ vars.DEPLOY_REPO }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Parse the latest version from CHANGELOG.md and check whether a
  # release tag already exists. All downstream jobs use these outputs so the
  # version is determined exactly once.
  # ---------------------------------------------------------------------------
  extract-version:
    name: Extract Version from CHANGELOG
    # Only run when the CI workflow that triggered this actually succeeded
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.changelog.outputs.version }}
      tag: ${{ steps.changelog.outputs.tag }}
      exists: ${{ steps.changelog.outputs.exists }}
      notes: ${{ steps.changelog.outputs.notes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Extract version from CHANGELOG.md
        id: changelog
        run: |
          VERSION=$(grep -oP '## \[\K\d+\.\d+\.\d+(?=\])' CHANGELOG.md | head -1)
          if [ -z "$VERSION" ]; then
            echo "No version found in CHANGELOG.md"
            exit 1
          fi

          TAG="v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

          # Check if this version was already released
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — skipping release pipeline."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New version detected: $TAG"
          fi

          # Extract release notes: content between this version header and the next
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Job 2: Build and push all Docker images to GitHub Container Registry.
  # Runs in a matrix (one runner per service) so all images build in parallel.
  # Must succeed before the release is created — if any image fails to build
  # the release is not published.
  # ---------------------------------------------------------------------------
  publish-images:
    name: Build & Push ${{ matrix.service }} image
    needs: [extract-version]
    if: needs.extract-version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    # Safety net: no single image build should take more than 40 minutes.
    # The UI build (React/TypeScript, large components) is the slowest at ~10-15 min.
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: api
            context: .
            dockerfile: api/Dockerfile
            platforms: linux/amd64,linux/arm64
          - service: ui
            context: ./pf9-ui
            dockerfile: pf9-ui/Dockerfile.prod
            # UI is amd64-only: QEMU-emulated ARM64 builds take 3-5x longer and
            # can OOM on GitHub-hosted runners with large React/TS codebases.
            platforms: linux/amd64
          - service: monitoring
            context: ./monitoring
            dockerfile: monitoring/Dockerfile
            platforms: linux/amd64,linux/arm64
          - service: backup-worker
            context: ./backup_worker
            dockerfile: backup_worker/Dockerfile
            platforms: linux/amd64,linux/arm64
          - service: metering-worker
            context: ./metering_worker
            dockerfile: metering_worker/Dockerfile
            platforms: linux/amd64,linux/arm64
          - service: scheduler-worker
            context: .
            dockerfile: scheduler_worker/Dockerfile
            platforms: linux/amd64,linux/arm64
          - service: search-worker
            context: ./search_worker
            dockerfile: search_worker/Dockerfile
            platforms: linux/amd64,linux/arm64
          - service: notification-worker
            context: ./notifications
            dockerfile: notifications/Dockerfile
            platforms: linux/amd64,linux/arm64
          - service: nginx
            context: ./nginx
            dockerfile: nginx/Dockerfile
            platforms: linux/amd64,linux/arm64
          - service: snapshot-worker
            context: .
            dockerfile: snapshots/Dockerfile
            platforms: linux/amd64,linux/arm64
          - service: ldap-sync-worker
            context: ./ldap_sync_worker
            dockerfile: ldap_sync_worker/Dockerfile
            platforms: linux/amd64,linux/arm64
          - service: tenant-portal
            context: .
            dockerfile: tenant_portal/Dockerfile
            platforms: linux/amd64,linux/arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (enables ARM64 emulation on the AMD64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pf9-mngt-${{ matrix.service }}:${{ needs.extract-version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/pf9-mngt-${{ matrix.service }}:latest

  # ---------------------------------------------------------------------------
  # Job 3: Package the Helm chart and push it to GHCR OCI registry.
  # Depends on publish-images so the chart is never ahead of the images.
  # ---------------------------------------------------------------------------
  helm-package:
    name: Package & Push Helm Chart
    needs: [extract-version, publish-images]
    if: needs.extract-version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Log in to GHCR (Helm OCI registry)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
              -u "${{ github.actor }}" \
              --password-stdin

      - name: Package chart
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          helm package k8s/helm/pf9-mngt \
            --version "${VERSION}" \
            --app-version "${VERSION}"

      - name: Push chart to GHCR
        run: |
          helm push pf9-mngt-*.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/helm

  # ---------------------------------------------------------------------------
  # Job 4: Update values.prod.yaml in the private deploy repo and push.
  # ArgoCD watches the deploy repo and auto-syncs when this commit lands.
  #
  # Required setup (one-time, in GitHub repo Settings → Secrets and variables):
  #   Secret:   RELEASE_PAT   — Personal Access Token with `repo` scope
  #   Variable: DEPLOY_REPO   — name of your private deploy repo (see top of file)
  #
  # The deploy repo is resolved as: <repository_owner>/<DEPLOY_REPO>
  # ---------------------------------------------------------------------------
  update-values:
    name: Update values.prod.yaml Image Tags
    needs: [extract-version, helm-package]
    if: needs.extract-version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Clone private deploy repo
        run: |
          git clone https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/${{ github.repository_owner }}/${DEPLOY_REPO}.git deploy-repo

      - name: Patch image tags in values.prod.yaml
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          FILE="deploy-repo/values.prod.yaml"

          # 1. Update global.imageTag
          sed -i "s|^  imageTag:.*|  imageTag: v${VERSION}|" "${FILE}"

          # 2. Clear any per-service tag overrides that shadow global.imageTag.
          #    Handles unquoted, double-quoted, AND single-quoted version strings,
          #    plus flexible whitespace after the colon.
          #    e.g.  tag: v1.82.21          → tag: ""
          #          tag: "v1.82.21"        → tag: ""
          #          tag: 'v1.82.21'        → tag: ""
          sed -i -E "s/^([[:space:]]+tag:[[:space:]]*)[\"']*v[0-9]+[.][0-9]+[.][0-9]+[\"']*[[:space:]]*\$/\1\"\"/" "${FILE}"

          echo "values.prod.yaml patched to v${VERSION}, per-service overrides cleared."

      - name: Commit and push updated values.prod.yaml
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          cd deploy-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add values.prod.yaml
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "values.prod.yaml already up to date — skipping commit."
          else
            git commit -m "ci: update image tags to v${VERSION} [skip ci]"
            git push origin main
          fi

  # ---------------------------------------------------------------------------
  # Job 5: Create the Git tag and GitHub Release.
  # Only runs after ALL image builds AND Helm packaging succeed.
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [extract-version, publish-images, helm-package, update-values]
    if: needs.extract-version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ needs.extract-version.outputs.tag }} \
            -m "Release ${{ needs.extract-version.outputs.tag }}"
          git push origin ${{ needs.extract-version.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.extract-version.outputs.tag }}
          name: Release ${{ needs.extract-version.outputs.tag }}
          body: ${{ needs.extract-version.outputs.notes }}
          draft: false
          prerelease: false
