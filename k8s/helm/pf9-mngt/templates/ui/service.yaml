apiVersion: v1
kind: Service
metadata:
  name: pf9-ui
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    {{- include "pf9mngt.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: 5173
      protocol: TCP
      name: http
