apiVersion: apps/v1
kind: Deployment
metadata:
  name: pf9-search-worker
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: search-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pf9mngt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: search-worker
  template:
    metadata:
      labels:
        {{- include "pf9mngt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: search-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: search-worker
          image: {{ include "pf9mngt.appImage" (dict "repo" .Values.workers.searchWorker.image.repository "svcTag" .Values.workers.searchWorker.image.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: DB_HOST
              value: {{ .Values.db.host | quote }}
            - name: DB_PORT
              value: {{ .Values.db.port | quote }}
            - name: DB_NAME
              value: {{ .Values.db.name | quote }}
            - name: DB_USER
              value: {{ .Values.db.user | quote }}
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.dbCredentials }}
                  key: password
            - name: SEARCH_INDEX_INTERVAL
              value: {{ .Values.workers.searchWorker.searchIndexInterval | quote }}
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redisSecret }}
                  key: redis-password
          livenessProbe:
            exec:
              command: ["python3", "-c", "import os,time; s=os.stat('/tmp/alive'); exit(0 if time.time()-s.st_mtime < 900 else 1)"]
            initialDelaySeconds: 120
            periodSeconds: 120
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.workers.searchWorker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
