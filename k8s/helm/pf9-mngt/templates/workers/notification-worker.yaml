apiVersion: apps/v1
kind: Deployment
metadata:
  name: pf9-notification-worker
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: notification-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pf9mngt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: notification-worker
  template:
    metadata:
      labels:
        {{- include "pf9mngt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: notification-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: notification-worker
          image: {{ include "pf9mngt.appImage" (dict "repo" .Values.workers.notificationWorker.image.repository "svcTag" .Values.workers.notificationWorker.image.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: PF9_DB_HOST
              value: {{ .Values.db.host | quote }}
            - name: PF9_DB_PORT
              value: {{ .Values.db.port | quote }}
            - name: PF9_DB_NAME
              value: {{ .Values.db.name | quote }}
            - name: PF9_DB_USER
              value: {{ .Values.db.user | quote }}
            - name: PF9_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.dbCredentials }}
                  key: password
            - name: SMTP_ENABLED
              value: {{ .Values.smtp.enabled | quote }}
            - name: SMTP_HOST
              value: {{ .Values.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.smtp.port | quote }}
            - name: SMTP_USE_TLS
              value: {{ .Values.smtp.useTLS | quote }}
            - name: SMTP_USERNAME
              value: {{ .Values.smtp.username | quote }}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.smtpSecrets }}
                  key: password
                  optional: true
            - name: SMTP_FROM_ADDRESS
              value: {{ .Values.smtp.fromAddress | quote }}
            - name: SMTP_FROM_NAME
              value: {{ .Values.smtp.fromName | quote }}
            - name: NOTIFICATION_POLL_INTERVAL_SECONDS
              value: {{ .Values.workers.notificationWorker.pollIntervalSeconds | quote }}
            - name: NOTIFICATION_DIGEST_ENABLED
              value: {{ .Values.workers.notificationWorker.digestEnabled | quote }}
            - name: NOTIFICATION_DIGEST_HOUR_UTC
              value: {{ .Values.workers.notificationWorker.digestHourUTC | quote }}
            - name: NOTIFICATION_LOOKBACK_SECONDS
              value: {{ .Values.workers.notificationWorker.lookbackSeconds | quote }}
            - name: HEALTH_ALERT_THRESHOLD
              value: {{ .Values.workers.notificationWorker.healthAlertThreshold | quote }}
            - name: LOG_FILE
              value: "/app/logs/pf9_notifications.log"
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redisSecret }}
                  key: redis-password
          livenessProbe:
            exec:
              command: ["python3", "-c", "import os,time; s=os.stat('/tmp/alive'); exit(0 if time.time()-s.st_mtime < 600 else 1)"]
            initialDelaySeconds: 120
            periodSeconds: 120
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.workers.notificationWorker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}
