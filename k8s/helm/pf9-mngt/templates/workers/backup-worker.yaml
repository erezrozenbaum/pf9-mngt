{{- if .Values.workers.backupWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pf9-backup-worker
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pf9mngt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backup-worker
  template:
    metadata:
      labels:
        {{- include "pf9mngt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backup-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backup-worker
          image: {{ include "pf9mngt.appImage" (dict "repo" .Values.workers.backupWorker.image.repository "svcTag" .Values.workers.backupWorker.image.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: DB_HOST
              value: {{ .Values.db.host | quote }}
            - name: DB_PORT
              value: {{ .Values.db.port | quote }}
            - name: DB_NAME
              value: {{ .Values.db.name | quote }}
            - name: DB_USER
              value: {{ .Values.db.user | quote }}
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.dbCredentials }}
                  key: password
            - name: BACKUP_PATH
              value: {{ .Values.workers.backupWorker.backupPath | quote }}
            - name: POLL_INTERVAL
              value: {{ .Values.workers.backupWorker.pollInterval | quote }}
            - name: JOB_POLL_INTERVAL
              value: {{ .Values.workers.backupWorker.jobPollInterval | quote }}
            - name: LDAP_HOST
              value: {{ .Values.ldap.server | quote }}
            - name: LDAP_PORT
              value: {{ .Values.ldap.port | quote }}
            - name: LDAP_BASE_DN
              value: {{ .Values.ldap.baseDN | quote }}
            - name: LDAP_ADMIN_DN
              value: {{ .Values.ldap.adminDN | quote }}
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.ldapSecrets }}
                  key: admin-password
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redisSecret }}
                  key: redis-password
          livenessProbe:
            exec:
              command: ["python3", "-c", "import os,time; s=os.stat('/tmp/alive'); exit(0 if time.time()-s.st_mtime < 180 else 1)"]
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.workers.backupWorker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: backups
              mountPath: {{ .Values.workers.backupWorker.backupPath }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: backups
          persistentVolumeClaim:
            claimName: pf9-backups
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pf9-backups
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup-worker
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.workers.backupWorker.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.workers.backupWorker.persistence.size }}
{{- end }}
