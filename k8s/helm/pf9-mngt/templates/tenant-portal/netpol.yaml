# NetworkPolicy for pf9-tenant-portal
# Ingress: only from the dedicated nginx-tenant ingress controller (ingress-nginx-tenant namespace)
# Egress:  DB (5432) + Redis (6379) + Keystone HTTPS (443, 5000) + DNS; all other egress blocked.
# Rationale: tenant_portal_role must never reach the admin API, LDAP, or SMTP.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pf9-tenant-portal
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: tenant-portal
spec:
  podSelector:
    matchLabels:
      {{- include "pf9mngt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tenant-portal
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow HTTP from the dedicated nginx-tenant ingress controller only.
    # The tenant controller is deployed into the ingress-nginx-tenant namespace
    # (helm install nginx-ingress-tenant ... --namespace ingress-nginx-tenant).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx-tenant
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - port: 8010
          protocol: TCP

  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: db
      ports:
        - port: 5432
          protocol: TCP

    # Redis
    - to:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: redis
      ports:
        - port: 6379
          protocol: TCP

    # Keystone authentication — tenant-portal calls the control plane's Keystone
    # endpoint to validate credentials. Allow HTTPS (443) and the Keystone
    # native port (5000) to any destination (the auth_url is user-configured).
    - to: []
      ports:
        - port: 443
          protocol: TCP
        - port: 5000
          protocol: TCP

    # DNS resolution (CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
