apiVersion: apps/v1
kind: Deployment
metadata:
  name: pf9-tenant-portal
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: tenant-portal
spec:
  replicas: {{ .Values.tenantPortal.replicaCount }}
  selector:
    matchLabels:
      {{- include "pf9mngt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tenant-portal
  template:
    metadata:
      labels:
        {{- include "pf9mngt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tenant-portal
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tenant-portal
          image: {{ include "pf9mngt.appImage" (dict "repo" .Values.tenantPortal.image.repository "svcTag" .Values.tenantPortal.image.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8010
              name: http
          env:
            # --- Database (connects as tenant_portal_role, NOT the admin user) ---
            - name: PF9_DB_HOST
              value: {{ .Values.db.host | quote }}
            - name: PF9_DB_PORT
              value: {{ .Values.db.port | quote }}
            - name: PF9_DB_NAME
              value: {{ .Values.db.name | quote }}
            - name: TENANT_DB_USER
              value: tenant_portal_role
            - name: TENANT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.tenantPortalDbCredentials }}
                  key: password
            # --- JWT (same signing key as admin API — role claim discriminates) ---
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.jwtSecret }}
                  key: jwt-secret-key
            - name: JWT_ALGORITHM
              value: {{ .Values.jwt.algorithm | quote }}
            # --- Tenant portal config ---
            - name: TENANT_PORTAL_CONTROL_PLANE_ID
              value: {{ .Values.tenantPortal.config.controlPlaneId | quote }}
            - name: TENANT_MFA_MODE
              value: {{ .Values.tenantPortal.config.mfaMode | quote }}
            - name: TENANT_IP_BINDING
              value: {{ .Values.tenantPortal.config.ipBinding | quote }}
            - name: TENANT_TOKEN_EXPIRE_MINUTES
              value: {{ .Values.tenantPortal.config.tokenExpireMinutes | quote }}
            - name: TENANT_RESTORE_ENABLED
              value: {{ .Values.tenantPortal.config.restoreEnabled | default "true" | quote }}
            {{- if .Values.tenantPortal.config.corsOriginPattern }}
            - name: TENANT_CORS_ORIGIN_PATTERN
              value: {{ .Values.tenantPortal.config.corsOriginPattern | quote }}
            {{- else if .Values.ingress.host }}
            - name: TENANT_CORS_ORIGIN_PATTERN
              value: {{ printf "^https://%s$" .Values.ingress.host | quote }}
            {{- end }}
            # --- Redis ---
            - name: REDIS_HOST
              value: pf9-redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redisSecret }}
                  key: redis-password
            # --- Internal service URLs ---
            - name: MONITORING_SERVICE_URL
              value: "http://pf9-monitoring:8001"
            - name: INTERNAL_API_URL
              value: "http://pf9-api:8000"
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.internalServiceSecret }}
                  key: secret
                  optional: true
            # --- Platform9 / Gnocchi telemetry (same credentials as admin API) ---
            - name: PF9_AUTH_URL
              value: {{ .Values.pf9.authUrl | quote }}
            - name: PF9_USER_DOMAIN
              value: {{ .Values.pf9.userDomain | quote }}
            - name: PF9_PROJECT_NAME
              value: {{ .Values.pf9.projectName | quote }}
            - name: PF9_PROJECT_DOMAIN
              value: {{ .Values.pf9.projectDomain | quote }}
            - name: PF9_REGION_NAME
              value: {{ .Values.pf9.regionName | quote }}
            - name: PF9_USERNAME
              value: {{ .Values.pf9.username | quote }}
            - name: PF9_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.pf9Credentials }}
                  key: password
          livenessProbe:
            httpGet:
              path: /tenant/health
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /tenant/health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.tenantPortal.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
