{{- if .Values.tenantPortal.dbPassword }}
# This Secret is only rendered when tenantPortal.dbPassword is non-empty.
# In production, set the value via an ArgoCD application parameter override
# (Applications → pf9-mngt → Parameters → tenantPortal.dbPassword=<value>)
# so the real password is never stored in git.
#
# The same password must be set on the tenant_portal_role DB user:
#   kubectl -n pf9-mngt exec pf9-db-0 -- psql -U pf9 -d pf9_mgmt \
#     -c "ALTER USER tenant_portal_role WITH PASSWORD '<value>';"
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.tenantPortalDbCredentials }}
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: tenant-portal
  annotations:
    helm.sh/resource-policy: keep  # never delete on helm uninstall
type: Opaque
stringData:
  password: {{ .Values.tenantPortal.dbPassword | quote }}
{{- end }}
