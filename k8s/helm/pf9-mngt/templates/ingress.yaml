{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pf9-mngt
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
  annotations:
    {{- if and .Values.ingress.tls.enabled .Values.ingress.host }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    {{- end }}
    # Enable regex paths so we can match all API prefixes in a single rule
    nginx.ingress.kubernetes.io/use-regex: "true"
    {{- range $key, $val := .Values.ingress.annotations }}
    {{ $key }}: {{ $val | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.host }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          # /metrics/ → monitoring service (exact /metrics → API Prometheus endpoint below)
          - path: /metrics/.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: pf9-monitoring
                port:
                  number: {{ .Values.monitoring.service.port }}

          # All FastAPI backend paths — mirrors nginx.prod.conf routing exactly.
          # Covers: /api /auth /health /admin /settings /dashboard /notifications
          #   /monitoring /history /audit /drift /tenant-health /user /static
          #   /restore and every top-level resource endpoint the UI calls directly.
          # NOTE: "metrics" is intentionally EXCLUDED here — /metrics/.* is routed to
          # pf9-monitoring above. In K8s, Prometheus scrapes pods directly (ServiceMonitor),
          # so the bare /metrics endpoint does not need to be exposed through ingress.
          - path: /(api|auth|health|admin|settings|dashboard|notifications|monitoring|history|audit|drift|tenant-health|user|static|restore|domains|tenants|projects|servers|volumes|volumes-with-metadata|snapshots|networks|subnets|ports|floatingips|flavors|security-groups|security-group-rules|images|hypervisors|keypairs|host-aggregates|volume-types|server-groups|project-quotas|users|roles|user-activity-summary|role-assignments|os-distribution|demo-mode|docs|redoc|openapi\.json|system-metadata-summary|export)(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: pf9-api
                port:
                  number: {{ .Values.api.service.port }}

          # /tenant/.* → tenant portal service (JWT-protected, RLS-enforced)
          - path: /tenant(/.*)?
            pathType: ImplementationSpecific
            backend:
              service:
                name: pf9-tenant-portal
                port:
                  number: {{ .Values.tenantPortal.service.port }}

          # Everything else → React SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pf9-ui
                port:
                  number: {{ .Values.ui.service.port }}
{{- end }}
