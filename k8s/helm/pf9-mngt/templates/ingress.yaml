{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pf9-mngt
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
  annotations:
    {{- if and .Values.ingress.tls.enabled .Values.ingress.host }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    {{- end }}
    {{- range $key, $val := .Values.ingress.annotations }}
    {{ $key }}: {{ $val | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.host }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          # /api and /auth → FastAPI backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: pf9-api
                port:
                  number: {{ .Values.api.service.port }}
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: pf9-api
                port:
                  number: {{ .Values.api.service.port }}
          # /health → FastAPI health endpoint (also useful for uptime monitors)
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: pf9-api
                port:
                  number: {{ .Values.api.service.port }}
          # Everything else → React UI
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pf9-ui
                port:
                  number: {{ .Values.ui.service.port }}
{{- end }}
