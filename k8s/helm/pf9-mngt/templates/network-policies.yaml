{{- if .Values.networkPolicy.enabled }}
# ===========================================================================
# NetworkPolicies — default-deny-all ingress + egress per service.
# Enabled when networkPolicy.enabled=true (see values.yaml).
#
# The pf9-tenant-portal policy is managed separately in
# templates/tenant-portal/netpol.yaml (always-on, not gated here).
#
# Label selectors match the live cluster pod labels:
#   app.kubernetes.io/name=pf9-mngt
#   app.kubernetes.io/instance=pf9-mngt
#   app.kubernetes.io/component=<component>
#
# Namespace labels confirmed on cluster:
#   ingress-nginx:        kubernetes.io/metadata.name=ingress-nginx
#   ingress-nginx-tenant: kubernetes.io/metadata.name=ingress-nginx-tenant
#   kube-system:          kubernetes.io/metadata.name=kube-system
# ===========================================================================

# ---------------------------------------------------------------------------
# API
# ---------------------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pf9-api
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      {{- include "pf9mngt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # nginx ingress controller (admin UI + API traffic)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - port: 8000
          protocol: TCP
    # Internal calls from tenant-portal (/internal/*)
    - from:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: tenant-portal
      ports:
        - port: 8000
          protocol: TCP
    # Metering worker calls API
    - from:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: metering-worker
      ports:
        - port: 8000
          protocol: TCP
    # Scheduler worker calls API
    - from:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: scheduler-worker
      ports:
        - port: 8000
          protocol: TCP
    # Monitoring service calls API for internal service discovery
    - from:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: monitoring
      ports:
        - port: 8000
          protocol: TCP

  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: db
      ports:
        - port: 5432
          protocol: TCP
    # Redis
    - to:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: redis
      ports:
        - port: 6379
          protocol: TCP
    # OpenLDAP
    - to:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: ldap
      ports:
        - port: 389
          protocol: TCP
    # Platform9 / Keystone external
    - to: []
      ports:
        - port: 443
          protocol: TCP
        - port: 5000
          protocol: TCP
    # DNS (CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

# ---------------------------------------------------------------------------
# Database (PostgreSQL)
# ---------------------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pf9-db
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  podSelector:
    matchLabels:
      {{- include "pf9mngt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: db
  policyTypes:
    - Ingress
    - Egress

  ingress:
    {{- $dbClients := list "api" "db-migrate" "backup-worker" "intelligence-worker" "ldap-sync-worker" "metering-worker" "notification-worker" "scheduler-worker" "search-worker" "sla-worker" "snapshot-worker" "tenant-portal" }}
    {{- range $dbClients }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" $ | nindent 14 }}
              app.kubernetes.io/component: {{ . }}
      ports:
        - port: 5432
          protocol: TCP
    {{- end }}

  egress:
    # DNS only (postgres doesn't initiate outbound connections)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

