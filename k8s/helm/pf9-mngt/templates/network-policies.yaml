# ---------------------------------------------------------------------------
# OpenLDAP
# ---------------------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pf9-ldap
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: ldap
spec:
  podSelector:
    matchLabels:
      {{- include "pf9mngt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ldap
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # API authenticates users via LDAP
    - from:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
      ports:
        - port: 389
          protocol: TCP
    # LDAP sync worker syncs directory data
    - from:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: ldap-sync-worker
      ports:
        - port: 389
          protocol: TCP
    # Backup worker reads LDAP for backup metadata
    - from:
        - podSelector:
            matchLabels:
              {{- include "pf9mngt.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: backup-worker
      ports:
        - port: 389
          protocol: TCP

  egress:
    # DNS only
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

