apiVersion: apps/v1
kind: Deployment
metadata:
  name: pf9-redis
  namespace: {{ include "pf9mngt.namespace" . }}
  labels:
    {{- include "pf9mngt.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pf9mngt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "pf9mngt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: "{{ .Values.redisService.image.repository }}:{{ .Values.redisService.image.tag }}"
          imagePullPolicy: {{ .Values.redisService.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redisSecret }}
                  key: redis-password
            - name: REDISCLI_AUTH
              value: "$(REDIS_PASSWORD)"
          command: ["sh", "-c"]
          args:
            - >-
              if [ -n "$REDIS_PASSWORD" ]; then
                exec redis-server --requirepass "$REDIS_PASSWORD" --maxmemory {{ .Values.redisService.maxmemory | quote }} --maxmemory-policy allkeys-lru --save "";
              else
                exec redis-server --maxmemory {{ .Values.redisService.maxmemory | quote }} --maxmemory-policy allkeys-lru --save "";
              fi
          ports:
            - containerPort: 6379
              name: redis
          livenessProbe:
            exec:
              command: ["redis-cli", "--no-auth-warning", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "--no-auth-warning", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.redisService.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
