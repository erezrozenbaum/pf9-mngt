# ===========================================================================
# pf9-mngt Helm values — defaults (safe to commit to a public repo).
#
# SECRETS: This file contains NO real credentials. All sensitive values are
# pulled from pre-existing Kubernetes Secrets whose names are configured in
# the `secrets:` section below.  In production those Secrets are managed via
# Bitnami Sealed Secrets (see k8s/sealed-secrets/README.md).
# ===========================================================================

# ---------------------------------------------------------------------------
# Global image settings
# ---------------------------------------------------------------------------
global:
  # Base registry + owner path shared by all application images.
  imageRepo: ghcr.io/erezrozenbaum
  # Default tag — overridden per service in values.prod.yaml by CI.
  imageTag: latest
  imagePullPolicy: Always

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Namespace
# ---------------------------------------------------------------------------
namespace:
  create: true
  name: pf9-mngt

# ---------------------------------------------------------------------------
# Pre-existing Kubernetes Secret names
# (created via kubeseal before first helm install — see k8s/sealed-secrets/)
# ---------------------------------------------------------------------------
secrets:
  dbCredentials: pf9-db-credentials      # key: password
  jwtSecret: pf9-jwt-secret              # key: jwt-secret-key
  ldapSecrets: pf9-ldap-secrets          # keys: admin-password, config-password, readonly-password, sync-key
  adminCredentials: pf9-admin-credentials # key: admin-password
  smtpSecrets: pf9-smtp-secrets          # key: password
  encryptionSecrets: pf9-encryption-secrets  # keys: vm-provision-key, smtp-config-key, integration-key
  pf9Credentials: pf9-pf9-credentials    # key: password
  snapshotCreds: pf9-snapshot-creds      # keys: password-key, user-password-encrypted, service-user-password
  provisionCreds: pf9-provision-creds    # keys: password-key, user-password-encrypted
  sshCredentials: pf9-ssh-credentials    # key: password (optional)
  copilotSecrets: pf9-copilot-secrets    # keys: openai-api-key, anthropic-api-key (optional)
  tenantPortalDbCredentials: pf9-tenant-portal-db-credentials  # key: password (tenant_portal_role DB user)
  internalServiceSecret: pf9-internal-service-secret          # key: secret (shared token between tenant-portal and admin API)
  redisSecret: pf9-redis-secret                                # key: redis-password
  metricsSecret: pf9-metrics-secret                            # key: metrics-api-key

# ---------------------------------------------------------------------------
# Shared configuration (used by multiple services)
# ---------------------------------------------------------------------------
db:
  host: pf9-db
  port: "5432"
  name: pf9_mgmt
  user: pf9

ldap:
  server: pf9-ldap
  port: "389"
  baseDN: dc=pf9mgmt,dc=local
  userDN: "ou=users,dc=pf9mgmt,dc=local"
  groupDN: "ou=groups,dc=pf9mgmt,dc=local"
  organisation: "Platform9 Management"
  domain: "pf9mgmt.local"
  readonlyUser: "true"
  adminDN: "cn=admin,dc=pf9mgmt,dc=local"

pf9:
  authUrl: ""         # e.g. https://your-cloud.platform9.net/keystone
  username: ""
  userDomain: Default
  projectName: service
  projectDomain: Default
  regionName: region-one
  verifyTLS: "true"

smtp:
  enabled: "false"
  host: ""
  port: "587"
  useTLS: "true"
  username: ""
  fromAddress: "pf9-mgmt@example.com"
  fromName: "Platform9 Management"

jwt:
  algorithm: HS256
  accessTokenExpireMinutes: "60"

redis:
  url: redis://pf9-redis:6379/0
  host: pf9-redis
  port: "6379"
  cacheEnabled: "true"
  cacheTTLSeconds: "60"

# ---------------------------------------------------------------------------
# API service
# ---------------------------------------------------------------------------
api:
  image:
    repository: pf9-mngt-api
    tag: ""         # "" → falls back to global.imageTag
  replicaCount: 1
  allowedOrigins: ""
  resources:
    limits:
      cpu: "1500m"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "256Mi"
  logFile: /app/logs/pf9_api.log
  enableAuthentication: "true"
  defaultAdminUser: admin
  demoMode: "false"
  dbPool:
    minConn: "2"
    maxConn: "10"
  restore:
    enabled: "true"
    dryRun: "false"
    cleanupVolumes: "false"
  snapshot:
    # serviceUserEmail moved to sealed secret pf9-snapshot-creds (key: service-user-email)
    serviceUserDomain: default
    schedulerEnabled: "true"
    policyAssignIntervalMinutes: "60"
    autoSnapshotIntervalMinutes: "60"
    maxSizeGB: "260"
    rvtoolsIntegrationEnabled: "true"
    complianceReportEnabled: "true"
    complianceReportIntervalMinutes: "1440"
    complianceReportSLADays: "2"
    policyAssignMergeExisting: "true"
    policyAssignDryRun: "false"
    policyAssignSyncPolicySets: "true"
    autoSnapshotMaxNew: "200"
    autoSnapshotDryRun: "false"
    autoSnapshotBatchSize: "20"
    autoSnapshotBatchDelay: "5.0"
  provision:
    # serviceUserEmail moved to sealed secret pf9-provision-creds (key: service-user-email)
    serviceUserDomain: Default
  ssh:
    hosts: ""
    user: pf9
    keyPath: ""
  parallel:
    maxRegions: "3"
    regionRequestTimeoutSec: "30"
  copilot:
    backend: builtin
    ollamaUrl: http://host.docker.internal:11434
    ollamaModel: llama3
    openaiModel: gpt-4o-mini
    anthropicModel: claude-sonnet-4-20250514
    redactSensitive: "true"
  service:
    type: ClusterIP
    port: 8000

# ---------------------------------------------------------------------------
# UI service
# ---------------------------------------------------------------------------
ui:
  image:
    repository: pf9-mngt-ui
    tag: ""
  replicaCount: 1
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "50m"
      memory: "64Mi"
  service:
    type: ClusterIP
    port: 8080

# ---------------------------------------------------------------------------
# Monitoring service
# ---------------------------------------------------------------------------
monitoring:
  image:
    repository: pf9-mngt-monitoring
    tag: ""
  replicaCount: 1
  pf9Hosts: ""
  metricsCacheTTL: "60"
  watchdogInterval: "60"
  watchdogCooldown: "1800"
  resources:
    limits:
      cpu: "500m"
      memory: "256Mi"
    requests:
      cpu: "50m"
      memory: "64Mi"
  service:
    type: ClusterIP
    port: 8001

# ---------------------------------------------------------------------------
# Tenant Portal API (v1.84.0) — isolated FastAPI service for tenant self-service
# Connects as tenant_portal_role (read-only, RLS-enforced DB user).
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Tenant Portal UI (React SPA → nginx)
# ---------------------------------------------------------------------------
tenantUi:
  enabled: true
  image:
    repository: pf9-mngt-tenant-ui
    tag: ""   # "" → falls back to global.imageTag
  replicaCount: 1
  resources:
    limits:
      cpu: "250m"
      memory: "64Mi"
    requests:
      cpu: "25m"
      memory: "16Mi"
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: true
    className: nginx-tenant   # Second ingress controller for tenant traffic (set in private deploy repo)
    host: ""    # e.g. portal.pf9-mngt.example.com — set in values.prod.yaml
    tls:
      enabled: true
      secretName: pf9-tenant-ui-tls
      clusterIssuer: letsencrypt-prod
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "10m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/limit-rps: "60"
      nginx.ingress.kubernetes.io/limit-connections: "15"

# ---------------------------------------------------------------------------
# Tenant Portal API (FastAPI)
# ---------------------------------------------------------------------------
tenantPortal:
  image:
    repository: pf9-mngt-tenant-portal
    tag: ""   # "" → falls back to global.imageTag
  replicaCount: 1
  # dbPassword: set via ArgoCD parameter override — NEVER commit a real value here.
  # When non-empty, Helm renders templates/tenant-portal/secret.yaml which creates
  # (or updates) the pf9-tenant-portal-db-credentials secret.
  # The same password must be set on the DB role:
  #   kubectl -n pf9-mngt exec pf9-db-0 -- psql -U pf9 -d pf9_mgmt \
  #     -c "ALTER USER tenant_portal_role WITH PASSWORD '<value>';"
  dbPassword: ""  # override via ArgoCD parameter: tenantPortal.dbPassword=<secret>
  # internalServiceSecret: shared token between tenant-portal and admin API for
  # internal calls (/internal/tenant-quota, /internal/sg-rule, etc.).
  # Create the K8s secret manually (once per cluster) then leave this empty:
  #   kubectl -n pf9-mngt create secret generic pf9-internal-service-secret \
  #     --from-literal=secret=$(openssl rand -hex 32)
  # Both the admin API and tenant-portal pods must reference the same secret.
  internalServiceSecret: ""  # leave empty — secret created out-of-band on the cluster
  config:
    controlPlaneId: "default" # TENANT_PORTAL_CONTROL_PLANE_ID — must match pf9_control_planes.id
    mfaMode: email_otp       # TENANT_MFA_MODE: email_otp | totp | none
    ipBinding: warn          # TENANT_IP_BINDING: strict | warn | off
    tokenExpireMinutes: "60" # TENANT_TOKEN_EXPIRE_MINUTES
    corsOriginPattern: ""    # TENANT_CORS_ORIGIN_PATTERN (defaults to ingress host pattern)
    restoreEnabled: "true"   # TENANT_RESTORE_ENABLED: enable self-service restore for tenants
  resources:
    limits:
      cpu: "500m"
      memory: "256Mi"
    requests:
      cpu: "50m"
      memory: "64Mi"
  service:
    type: ClusterIP
    port: 8010

# ---------------------------------------------------------------------------
# Monitoring service
# ---------------------------------------------------------------------------
postgresql:
  image:
    repository: postgres
    tag: "16.8-alpine"
    pullPolicy: IfNotPresent
  persistence:
    size: 20Gi
    storageClass: nfs-pf9
  resources:
    limits:
      cpu: "1000m"
      memory: "1Gi"
    requests:
      cpu: "100m"
      memory: "256Mi"
  statementTimeout: "120000"
  idleInTransactionSessionTimeout: "30000"
  service:
    port: 5432

# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
redisService:
  image:
    repository: redis
    tag: "7.4.3-alpine"
    pullPolicy: IfNotPresent
  maxmemory: 128mb
  resources:
    limits:
      cpu: "300m"
      memory: "192Mi"
    requests:
      cpu: "25m"
      memory: "32Mi"
  service:
    port: 6379

# ---------------------------------------------------------------------------
# M9: ResourceQuota — cap total CPU/memory/pods in the namespace
# ---------------------------------------------------------------------------
resourceQuota:
  enabled: true
  requests:
    cpu: "3000m"       # sum of all pod requests.cpu (~2.5 with headroom)
    memory: "6Gi"      # sum of all pod requests.memory (~5Gi with headroom)
  limits:
    cpu: "20000m"      # generous ceiling (20 cores) — prevents starvation
    memory: "20Gi"     # generous ceiling
  maxPods: "40"        # current baseline is 17; 40 gives room for scale-out

# ---------------------------------------------------------------------------
# M11: PodDisruptionBudgets — keep at least 1 replica available during drains
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true        # Requires Kubernetes 1.21+ (policy/v1 PDB API)

# ---------------------------------------------------------------------------
# M12: HorizontalPodAutoscaler — auto-scale API on CPU/memory
# NOTE: Requires metrics-server deployed on the cluster.
# ---------------------------------------------------------------------------
hpa:
  enabled: false       # Set to true after confirming metrics-server is installed
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# OpenLDAP (StatefulSet)
# ---------------------------------------------------------------------------
ldapService:
  image:
    repository: osixia/openldap
    tag: "1.5.0"
    pullPolicy: IfNotPresent
  persistence:
    data:
      size: 5Gi
      storageClass: nfs-pf9
    config:
      size: 1Gi
      storageClass: nfs-pf9
  resources:
    limits:
      cpu: "500m"
      memory: "256Mi"
    requests:
      cpu: "25m"
      memory: "64Mi"
  service:
    port: 389

# ---------------------------------------------------------------------------
# Workers
# ---------------------------------------------------------------------------
workers:
  backupWorker:
    image:
      repository: pf9-mngt-backup-worker
      tag: ""
    enabled: true
    backupPath: /backups
    pollInterval: "3600"
    jobPollInterval: "30"
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "50m"
        memory: "64Mi"
    persistence:
      size: 50Gi
      storageClass: nfs-pf9

  ldapSyncWorker:
    image:
      repository: pf9-mngt-ldap-sync-worker
      tag: ""
    ldapSyncPollInterval: "30"
    resources:
      limits:
        cpu: "250m"
        memory: "128Mi"
      requests:
        cpu: "25m"
        memory: "32Mi"

  meteringWorker:
    image:
      repository: pf9-mngt-metering-worker
      tag: ""
    meteringPollInterval: "60"
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "50m"
        memory: "64Mi"

  notificationWorker:
    image:
      repository: pf9-mngt-notification-worker
      tag: ""
    pollIntervalSeconds: "120"
    digestEnabled: "true"
    digestHourUTC: "8"
    lookbackSeconds: "300"
    healthAlertThreshold: "50"
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "50m"
        memory: "64Mi"

  schedulerWorker:
    image:
      repository: pf9-mngt-scheduler-worker
      tag: ""
    metricsEnabled: "true"
    metricsIntervalSeconds: "60"
    rvtoolsEnabled: "true"
    rvtoolsIntervalMinutes: "15"
    rvtoolsScheduleTime: "03:00"
    rvtoolsRunOnStart: "true"
    rvtoolsRetentionDays: "30"
    resources:
      limits:
        cpu: "1000m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

  searchWorker:
    image:
      repository: pf9-mngt-search-worker
      tag: ""
    searchIndexInterval: "300"
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "50m"
        memory: "64Mi"

  snapshotWorker:
    image:
      repository: pf9-mngt-snapshot-worker
      tag: ""
    resources:
      limits:
        cpu: "1000m"
        memory: "768Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

  slaWorker:
    image:
      repository: pf9-mngt-sla-worker
      tag: ""
    pollInterval: "14400"
    resources:
      limits:
        cpu: "250m"
        memory: "128Mi"
      requests:
        cpu: "25m"
        memory: "32Mi"

  intelligenceWorker:
    image:
      repository: pf9-mngt-intelligence-worker
      tag: ""
    intervalSeconds: "900"
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "50m"
        memory: "64Mi"

# ---------------------------------------------------------------------------
# Network Policies (C5)
# ---------------------------------------------------------------------------
networkPolicy:
  # Set to true to deploy NetworkPolicies for all services.
  # The pf9-tenant-portal policy is always-on (in templates/tenant-portal/netpol.yaml).
  enabled: true

# ---------------------------------------------------------------------------
# Reports shared storage (RVTools Excel exports — shared between API and scheduler)
# ---------------------------------------------------------------------------
reports:
  persistence:
    enabled: true
    storageClass: nfs-pf9
    size: 10Gi

# ---------------------------------------------------------------------------
# Ingress (nginx-ingress + cert-manager)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  host: pf9-mngt.example.com
  tls:
    enabled: true
    secretName: pf9-mngt-tls
    clusterIssuer: letsencrypt-prod
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"
