; ---------------------------------------------------------------------------
; PgBouncer configuration — pf9-mngt
; Credentials are NOT stored here. The entrypoint script generates
; /etc/pgbouncer/userlist.txt at container startup from env vars.
; ---------------------------------------------------------------------------

[databases]
; Wildcard: proxy any database name through to the upstream DB server.
; DB_HOST / DB_PORT are substituted at startup via %env()%.
* = host=%env(PGBOUNCER_DB_HOST)% port=%env(PGBOUNCER_DB_PORT)%

[pgbouncer]
listen_addr         = 0.0.0.0
listen_port         = 5432

; Auth: scram-sha-256 for clients; auth_query fetches SCRAM verifiers from
; pg_shadow so that any DB user (pf9, tenant_portal_role, …) can connect
; without enumerating users in userlist.txt.
auth_type           = scram-sha-256
auth_file           = /etc/pgbouncer/userlist.txt
auth_user           = %env(PGBOUNCER_AUTH_USER)%
auth_query          = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; Transaction-mode pooling: most efficient for short-lived queries.
; SET LOCAL (used by tenant_portal) is transaction-scoped — fully compatible.
; pg_dump connects directly to db:5432 (backup_worker bypasses pgbouncer).
pool_mode           = transaction
default_pool_size   = %env(PGBOUNCER_POOL_SIZE)%
max_client_conn     = %env(PGBOUNCER_MAX_CLIENT_CONN)%

; psycopg2 sends extra_float_digits at startup — tell pgbouncer to accept it.
ignore_startup_parameters = extra_float_digits

; server_reset_query is ignored in transaction mode (kept for safety).
server_reset_query  = DISCARD ALL

; Logging
log_connections     = 0
log_disconnections  = 0
log_pooler_errors   = 1
stats_period        = 60
