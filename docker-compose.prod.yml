# docker-compose.prod.yml — production overrides
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this changes vs. docker-compose.yml:
#   - dev tools (pgAdmin, phpLDAPadmin) moved to opt-in "dev" profile
#   - PostgreSQL, LDAP, Redis, API, UI, and monitoring ports NOT bound to host
#     (all traffic must pass through the nginx TLS reverse proxy on 80/443)
#   - API: 4 Gunicorn workers + worker recycling + rate-limiter on
#   - UI: nginx production build (Dockerfile.prod) instead of Vite dev server
#   - nginx: uses nginx.prod.conf (UI upstream on :80, no HMR websocket upgrade)
#   - All custom services: image: override pointing to ghcr.io pre-built images
#     Set PF9_IMAGE_TAG in your .env to pin a specific release (e.g. v1.66.0).
#     Defaults to "latest" if not set.
#     Pull images with: docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

services:

  # -------------------------------------------------------------------------
  # DB — remove host port binding (already done in base, but explicit here)
  # -------------------------------------------------------------------------
  db:
    ports: []

  # -------------------------------------------------------------------------
  # LDAP — remove host port binding
  # -------------------------------------------------------------------------
  ldap:
    ports: []

  # -------------------------------------------------------------------------
  # Redis — remove host port binding, enable rate limiter
  # -------------------------------------------------------------------------
  redis:
    ports: []

  # -------------------------------------------------------------------------
  # API — 4 workers, worker recycling, rate-limiter on by default
  #       port NOT bound to host — all access via nginx TLS proxy
  # -------------------------------------------------------------------------
  pf9_api:
    image: ghcr.io/erezrozenbaum/pf9-mngt-api:${PF9_IMAGE_TAG:-latest}
    ports: []
    command: >
      gunicorn main:app
      -w 4
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 300
      --graceful-timeout 60
      --max-requests 1000
      --max-requests-jitter 50
    environment:
      PF9_RATE_LIMIT_ENABLED: "${PF9_RATE_LIMIT_ENABLED:-true}"

  # -------------------------------------------------------------------------
  # UI — nginx production build (two-stage: npm build → nginx:alpine)
  #      Requires pf9-ui/Dockerfile.prod
  #      port NOT bound to host — accessed only via nginx TLS proxy
  # -------------------------------------------------------------------------
  pf9_ui:
    build:
      context: ./pf9-ui
      dockerfile: Dockerfile.prod
    image: ghcr.io/erezrozenbaum/pf9-mngt-ui:${PF9_IMAGE_TAG:-latest}
    ports: []
    environment: {}    # Remove VITE_API_TARGET — not needed in prod nginx build
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # Monitoring — port NOT bound to host in production
  # -------------------------------------------------------------------------
  pf9_monitoring:
    image: ghcr.io/erezrozenbaum/pf9-mngt-monitoring:${PF9_IMAGE_TAG:-latest}
    ports: []
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  # -------------------------------------------------------------------------
  # nginx — use prod config (UI upstream on :80, no Vite HMR upgrade)
  # -------------------------------------------------------------------------
  nginx:
    image: ghcr.io/erezrozenbaum/pf9-mngt-nginx:${PF9_IMAGE_TAG:-latest}
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro

  # -------------------------------------------------------------------------
  # Worker services — use pre-built images from ghcr.io in production
  # -------------------------------------------------------------------------
  backup_worker:
    image: ghcr.io/erezrozenbaum/pf9-mngt-backup-worker:${PF9_IMAGE_TAG:-latest}

  metering_worker:
    image: ghcr.io/erezrozenbaum/pf9-mngt-metering-worker:${PF9_IMAGE_TAG:-latest}

  scheduler_worker:
    image: ghcr.io/erezrozenbaum/pf9-mngt-scheduler-worker:${PF9_IMAGE_TAG:-latest}

  search_worker:
    image: ghcr.io/erezrozenbaum/pf9-mngt-search-worker:${PF9_IMAGE_TAG:-latest}

  notification_worker:
    image: ghcr.io/erezrozenbaum/pf9-mngt-notification-worker:${PF9_IMAGE_TAG:-latest}

  snapshot_worker:
    image: ghcr.io/erezrozenbaum/pf9-mngt-snapshot-worker:${PF9_IMAGE_TAG:-latest}

  ldap_sync_worker:
    image: ghcr.io/erezrozenbaum/pf9-mngt-ldap-sync-worker:${PF9_IMAGE_TAG:-latest}

