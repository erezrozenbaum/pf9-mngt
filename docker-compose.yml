services:
  db:
    image: postgres:16
    container_name: pf9_db
    command: >
      postgres
        -c idle_in_transaction_session_timeout=30000
        -c statement_timeout=120000
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?ERROR: POSTGRES_USER must be set in .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?ERROR: POSTGRES_PASSWORD must be set in .env}"
      POSTGRES_DB: "${POSTGRES_DB:?ERROR: POSTGRES_DB must be set in .env}"
    # Port binding added by docker-compose.override.yml for dev (auto-loaded).
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  pgadmin:
    image: dpage/pgadmin4
    container_name: pf9_pgadmin
    profiles: ["dev"]   # C6: only starts with: docker compose --profile dev up
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@pf9-mgmt.local}
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:?ERROR: PGADMIN_PASSWORD must be set in .env}"
    # Port binding added by docker-compose.override.yml for dev (auto-loaded).
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m

  pf9_api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: pf9_api
    environment:
      PF9_DB_HOST: db
      PF9_DB_PORT: "5432"
      PF9_DB_NAME: ${POSTGRES_DB}
      PF9_DB_USER: ${POSTGRES_USER}
      PF9_DB_PASSWORD: ${POSTGRES_PASSWORD}

      # === Platform9 / OpenStack auth (non-secret fields) ===
      PF9_AUTH_URL: ${PF9_AUTH_URL}
      PF9_USER_DOMAIN: ${PF9_USER_DOMAIN:-Default}
      PF9_PROJECT_NAME: ${PF9_PROJECT_NAME:-service}
      PF9_PROJECT_DOMAIN: ${PF9_PROJECT_DOMAIN:-Default}
      PF9_REGION_NAME: ${PF9_REGION_NAME:-region-one}
      PF9_USERNAME: ${PF9_USERNAME}
      PF9_PASSWORD: ${PF9_PASSWORD}

      # === LDAP Authentication Configuration ===
      LDAP_SERVER: ldap
      LDAP_PORT: "389"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD:?ERROR: LDAP_ADMIN_PASSWORD must be set in .env}"
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=pf9mgmt,dc=local}
      LDAP_USER_DN: ${LDAP_USER_DN:-ou=users,dc=pf9mgmt,dc=local}
      LDAP_GROUP_DN: ${LDAP_GROUP_DN:-ou=groups,dc=pf9mgmt,dc=local}

      # === JWT Configuration ===
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:?ERROR: JWT_SECRET_KEY must be set in .env}"
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-480}

      # === Logging Configuration ===
      LOG_FILE: /app/logs/pf9_api.log

      # === Authentication Control ===
      ENABLE_AUTHENTICATION: ${ENABLE_AUTHENTICATION:-true}
      DEFAULT_ADMIN_USER: ${DEFAULT_ADMIN_USER:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}

      # === Restore Feature ===
      RESTORE_ENABLED: ${RESTORE_ENABLED:-false}
      RESTORE_DRY_RUN: ${RESTORE_DRY_RUN:-false}
      RESTORE_CLEANUP_VOLUMES: ${RESTORE_CLEANUP_VOLUMES:-false}

      # === Service User (shared with snapshot worker) ===
      SNAPSHOT_SERVICE_USER_EMAIL: ${SNAPSHOT_SERVICE_USER_EMAIL:-}
      SNAPSHOT_SERVICE_USER_PASSWORD: ${SNAPSHOT_SERVICE_USER_PASSWORD:-}
      SNAPSHOT_SERVICE_USER_DOMAIN: ${SNAPSHOT_SERVICE_USER_DOMAIN:-default}
      SNAPSHOT_PASSWORD_KEY: ${SNAPSHOT_PASSWORD_KEY:-}
      SNAPSHOT_USER_PASSWORD_ENCRYPTED: ${SNAPSHOT_USER_PASSWORD_ENCRYPTED:-}

      # === VM Provisioning Service User ===
      PROVISION_SERVICE_USER_EMAIL: ${PROVISION_SERVICE_USER_EMAIL:-}
      PROVISION_SERVICE_USER_DOMAIN: ${PROVISION_SERVICE_USER_DOMAIN:-Default}
      PROVISION_PASSWORD_KEY: ${PROVISION_PASSWORD_KEY:-}
      PROVISION_USER_PASSWORD_ENCRYPTED: ${PROVISION_USER_PASSWORD_ENCRYPTED:-}

      # === SSH Log Collection ===
      SSH_PF9_HOSTS: ${SSH_PF9_HOSTS:-}
      PF9_SSH_USER: ${PF9_SSH_USER:-pf9}
      PF9_SSH_PASSWORD: ${PF9_SSH_PASSWORD:-}
      PF9_SSH_KEY_PATH: ${PF9_SSH_KEY_PATH:-}

      # === Email Notifications ===
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-pf9-mgmt@example.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Platform9 Management}

      # === Connection Pool Tuning ===
      DB_POOL_MIN_CONN: ${DB_POOL_MIN_CONN:-2}
      DB_POOL_MAX_CONN: ${DB_POOL_MAX_CONN:-10}

      # === Demo Mode ===
      DEMO_MODE: ${DEMO_MODE:-false}

      # === Ops Copilot ===
      COPILOT_BACKEND: ${COPILOT_BACKEND:-builtin}
      COPILOT_OLLAMA_URL: ${COPILOT_OLLAMA_URL:-http://host.docker.internal:11434}
      COPILOT_OLLAMA_MODEL: ${COPILOT_OLLAMA_MODEL:-llama3}
      COPILOT_OPENAI_API_KEY: ${COPILOT_OPENAI_API_KEY:-}
      COPILOT_OPENAI_MODEL: ${COPILOT_OPENAI_MODEL:-gpt-4o-mini}
      COPILOT_ANTHROPIC_API_KEY: ${COPILOT_ANTHROPIC_API_KEY:-}
      COPILOT_ANTHROPIC_MODEL: ${COPILOT_ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      COPILOT_REDACT_SENSITIVE: ${COPILOT_REDACT_SENSITIVE:-true}
      # C9: Redis cache
      REDIS_URL: redis://redis:6379/0
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
    # Port binding added by docker-compose.override.yml for dev (auto-loaded).
    # In production, no override file is loaded so this port is never exposed.
    volumes:
      - app_logs:/app/logs
      - ./monitoring/cache:/app/monitoring/cache:ro
      - ${PF9_REPORTS_DIR:-./reports}:/mnt/reports:ro
      - ./api/static:/app/static
      - ./notifications/templates:/app/notification_templates:ro
    depends_on:
      - db
      - ldap
      - redis
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # J5: Docker secrets — mounted at /run/secrets/<name> when files exist.
    # Falls back to environment variables if secret files are absent (dev mode).
    secrets:
      - db_password
      - ldap_admin_password
      - pf9_password
      - jwt_secret
    healthcheck:   # C5
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1g

  pf9_ui:
    build:
      context: ./pf9-ui
    container_name: pf9_ui
    environment:
      VITE_API_TARGET: http://pf9_api:8000
      VITE_MONITORING_TARGET: http://pf9_monitoring:8001
    # Port binding added by docker-compose.override.yml for dev (auto-loaded).
    depends_on:
      - pf9_api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:   # C5
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m

  pf9_monitoring:
    build:
      context: ./monitoring
    container_name: pf9_monitoring
    environment:
      # Comma-separated list of PF9 host IPs to scrape metrics from
      PF9_HOSTS: ${PF9_HOSTS:-localhost}
      # Cache TTL in seconds for metrics collection
      METRICS_CACHE_TTL: ${METRICS_CACHE_TTL:-60}
      # Logging
      LOG_FILE: /app/logs/pf9_monitoring.log
      # === Container Restart Alerting ===
      API_BASE_URL: http://pf9_api:8000
      WATCHDOG_INTERVAL: ${WATCHDOG_INTERVAL:-60}
      WATCHDOG_COOLDOWN: ${WATCHDOG_COOLDOWN:-1800}
      DOCKER_SOCKET: /var/run/docker.sock
      # SMTP (shared with pf9_api — alerts sent directly from monitoring)
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-pf9-mgmt@example.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Platform9 Management}
    # Port binding added by docker-compose.override.yml for dev (auto-loaded).
    volumes:
      - "./monitoring/cache:/tmp/cache"
      - "./logs:/app/logs"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    depends_on:
      - pf9_api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  snapshot_worker:
    build:
      context: .
      dockerfile: snapshots/Dockerfile
    container_name: pf9_snapshot_worker
    environment:
      PF9_AUTH_URL: ${PF9_AUTH_URL}
      PF9_USER_DOMAIN: ${PF9_USER_DOMAIN:-Default}
      PF9_PROJECT_NAME: ${PF9_PROJECT_NAME:-service}
      PF9_PROJECT_DOMAIN: ${PF9_PROJECT_DOMAIN:-Default}
      PF9_REGION_NAME: ${PF9_REGION_NAME:-region-one}
      PF9_USERNAME: ${PF9_USERNAME}
      PF9_PASSWORD: ${PF9_PASSWORD}
      PF9_DB_HOST: db
      PF9_DB_PORT: ${PF9_DB_PORT:-5432}
      PF9_DB_NAME: ${PF9_DB_NAME:-pf9_mgmt}
      PF9_DB_USER: ${PF9_DB_USER:-pf9}
      PF9_DB_PASSWORD: ${PF9_DB_PASSWORD}
      SNAPSHOT_PASSWORD_KEY: ${SNAPSHOT_PASSWORD_KEY}
      SNAPSHOT_USER_PASSWORD_ENCRYPTED: ${SNAPSHOT_USER_PASSWORD_ENCRYPTED}
      SNAPSHOT_SERVICE_USER_EMAIL: ${SNAPSHOT_SERVICE_USER_EMAIL:-}
      SNAPSHOT_SERVICE_USER_PASSWORD: ${SNAPSHOT_SERVICE_USER_PASSWORD:-}
      SNAPSHOT_SCHEDULER_ENABLED: ${SNAPSHOT_SCHEDULER_ENABLED:-true}
      POLICY_ASSIGN_INTERVAL_MINUTES: ${POLICY_ASSIGN_INTERVAL_MINUTES:-60}
      AUTO_SNAPSHOT_INTERVAL_MINUTES: ${AUTO_SNAPSHOT_INTERVAL_MINUTES:-60}
      POLICY_ASSIGN_CONFIG: ${POLICY_ASSIGN_CONFIG:-/app/snapshots/snapshot_policy_rules.json}
      AUTO_SNAPSHOT_MAX_SIZE_GB: ${AUTO_SNAPSHOT_MAX_SIZE_GB:-260}
      RVTOOLS_INTEGRATION_ENABLED: ${RVTOOLS_INTEGRATION_ENABLED:-true}
      COMPLIANCE_REPORT_ENABLED: ${COMPLIANCE_REPORT_ENABLED:-true}
      COMPLIANCE_REPORT_INTERVAL_MINUTES: ${COMPLIANCE_REPORT_INTERVAL_MINUTES:-1440}
      COMPLIANCE_REPORT_SLA_DAYS: ${COMPLIANCE_REPORT_SLA_DAYS:-2}
      POLICY_ASSIGN_MERGE_EXISTING: ${POLICY_ASSIGN_MERGE_EXISTING:-true}
      POLICY_ASSIGN_DRY_RUN: ${POLICY_ASSIGN_DRY_RUN:-false}
      POLICY_ASSIGN_SYNC_POLICY_SETS: ${POLICY_ASSIGN_SYNC_POLICY_SETS:-true}
      AUTO_SNAPSHOT_MAX_NEW: ${AUTO_SNAPSHOT_MAX_NEW:-200}
      AUTO_SNAPSHOT_DRY_RUN: ${AUTO_SNAPSHOT_DRY_RUN:-false}
      AUTO_SNAPSHOT_BATCH_SIZE: ${AUTO_SNAPSHOT_BATCH_SIZE:-20}
      AUTO_SNAPSHOT_BATCH_DELAY: ${AUTO_SNAPSHOT_BATCH_DELAY:-5.0}
      # --- Phase 5: Multi-region worker config ---
      MAX_PARALLEL_REGIONS: ${MAX_PARALLEL_REGIONS:-3}
      REGION_REQUEST_TIMEOUT_SEC: ${REGION_REQUEST_TIMEOUT_SEC:-30}
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:?ERROR: JWT_SECRET_KEY must be set in .env}"
    volumes:
      - app_logs:/app/logs
      - ${PF9_REPORTS_DIR:-./reports}:/mnt/reports
    depends_on:
      - db
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768m

  # LDAP Directory Service for Authentication
  ldap:
    image: osixia/openldap:1.5.0
    container_name: pf9_ldap
    environment:
      LDAP_ORGANISATION: "${LDAP_ORGANISATION:-Platform9 Management}"
      LDAP_DOMAIN: "${LDAP_DOMAIN:-pf9mgmt.local}"
      LDAP_ADMIN_PASSWORD: '${LDAP_ADMIN_PASSWORD}'
      LDAP_CONFIG_PASSWORD: "${LDAP_CONFIG_PASSWORD}"
      LDAP_READONLY_USER: "${LDAP_READONLY_USER:-true}"
      LDAP_READONLY_USER_PASSWORD: "${LDAP_READONLY_PASSWORD}"
      LDAP_TLS_VERIFY_CLIENT: "never"
      LDAP_ADMIN_DN: "cn=admin,${LDAP_BASE_DN:-dc=pf9mgmt,dc=local}"
      LDAP_BASE_DN: "${LDAP_BASE_DN:-dc=pf9mgmt,dc=local}"
    # C4: ports 389/636 NOT exposed externally — LDAP accessible via internal Docker network only
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "sh", "-c", "ldapsearch -x -D \"$$LDAP_ADMIN_DN\" -w \"$$LDAP_ADMIN_PASSWORD\" -H ldap://localhost -b $$LDAP_BASE_DN -s base"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # Email Notification Worker
  notification_worker:
    build:
      context: ./notifications
    container_name: pf9_notification_worker
    environment:
      PF9_DB_HOST: db
      PF9_DB_PORT: "5432"
      PF9_DB_NAME: ${POSTGRES_DB}
      PF9_DB_USER: ${POSTGRES_USER}
      PF9_DB_PASSWORD: ${POSTGRES_PASSWORD}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-pf9-mgmt@example.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Platform9 Management}
      NOTIFICATION_POLL_INTERVAL_SECONDS: ${NOTIFICATION_POLL_INTERVAL_SECONDS:-120}
      NOTIFICATION_DIGEST_ENABLED: ${NOTIFICATION_DIGEST_ENABLED:-true}
      NOTIFICATION_DIGEST_HOUR_UTC: ${NOTIFICATION_DIGEST_HOUR_UTC:-8}
      NOTIFICATION_LOOKBACK_SECONDS: ${NOTIFICATION_LOOKBACK_SECONDS:-300}
      HEALTH_ALERT_THRESHOLD: ${HEALTH_ALERT_THRESHOLD:-50}
      LOG_FILE: /app/logs/pf9_notifications.log
    volumes:
      - app_logs:/app/logs
    depends_on:
      - db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time; s=os.stat('/tmp/alive'); exit(0 if time.time()-s.st_mtime < 600 else 1)"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # Scheduler Worker — replaces Windows Task Scheduler for:
  #   • host_metrics_collector.py  (writes metrics cache every METRICS_INTERVAL_SECONDS)
  #   • pf9_rvtools.py             (schedule: RVTOOLS_INTERVAL_MINUTES or RVTOOLS_SCHEDULE_TIME)
  scheduler_worker:
    build:
      context: .
      dockerfile: scheduler_worker/Dockerfile
    container_name: pf9_scheduler_worker
    environment:
      # --- PF9 / OpenStack auth ---
      PF9_AUTH_URL: ${PF9_AUTH_URL}
      PF9_USERNAME: ${PF9_USERNAME}
      PF9_PASSWORD: ${PF9_PASSWORD}
      PF9_USER_DOMAIN: ${PF9_USER_DOMAIN:-Default}
      PF9_PROJECT_NAME: ${PF9_PROJECT_NAME:-service}
      PF9_PROJECT_DOMAIN: ${PF9_PROJECT_DOMAIN:-Default}
      PF9_REGION_NAME: ${PF9_REGION_NAME:-region-one}
      PF9_VERIFY_TLS: ${PF9_VERIFY_TLS:-true}
      # --- Database (for RVTools db_writer) ---
      PF9_DB_HOST: db
      PF9_DB_PORT: "5432"
      PF9_DB_NAME: ${POSTGRES_DB}
      PF9_DB_USER: ${POSTGRES_USER}
      PF9_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # --- PF9 hosts for metrics collection ---
      PF9_HOSTS: ${PF9_HOSTS:-}
      PF9_HOST_MAP: ${PF9_HOST_MAP:-}
      # --- RVTools output ---
      PF9_OUTPUT_DIR: /mnt/reports
      # --- Metrics cache (shared with pf9_monitoring) ---
      METRICS_CACHE_PATH: /tmp/cache/metrics_cache.json
      # --- Schedule tunables ---
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_INTERVAL_SECONDS: ${METRICS_INTERVAL_SECONDS:-60}
      RVTOOLS_ENABLED: ${RVTOOLS_ENABLED:-true}
      RVTOOLS_INTERVAL_MINUTES: ${RVTOOLS_INTERVAL_MINUTES:-0}
      RVTOOLS_SCHEDULE_TIME: ${RVTOOLS_SCHEDULE_TIME:-03:00}
      RVTOOLS_RUN_ON_START: ${RVTOOLS_RUN_ON_START:-false}
      DEMO_MODE: ${DEMO_MODE:-false}
      # --- Phase 5: Multi-region worker config ---
      MAX_PARALLEL_REGIONS: ${MAX_PARALLEL_REGIONS:-3}
      REGION_REQUEST_TIMEOUT_SEC: ${REGION_REQUEST_TIMEOUT_SEC:-30}
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:?ERROR: JWT_SECRET_KEY must be set in .env}"
    volumes:
      - ./monitoring/cache:/tmp/cache
      - ${PF9_REPORTS_DIR:-./reports}:/mnt/reports
      - app_logs:/app/logs
    depends_on:
      - db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time; s=os.stat('/tmp/alive'); exit(0 if time.time()-s.st_mtime < 300 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m

  # Database & LDAP Backup Worker
  # Activate with: COMPOSE_PROFILES=backup in .env (requires NFS_BACKUP_SERVER + NFS_BACKUP_DEVICE)
  backup_worker:
    profiles: ["backup"]
    build:
      context: ./backup_worker
    container_name: pf9_backup_worker
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      BACKUP_PATH: /backups
      POLL_INTERVAL: ${BACKUP_POLL_INTERVAL:-3600}
      JOB_POLL_INTERVAL: ${BACKUP_JOB_POLL_INTERVAL:-30}
      # LDAP backup settings
      LDAP_HOST: ldap
      LDAP_PORT: "389"
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=pf9mgmt,dc=local}
      LDAP_ADMIN_DN: "cn=admin,${LDAP_BASE_DN:-dc=pf9mgmt,dc=local}"
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
    volumes:
      - nfs_backups:/backups
    depends_on:
      - db
      - ldap
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time; s=os.stat('/tmp/alive'); exit(0 if time.time()-s.st_mtime < 180 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # LDAP Administration Interface (dev only)
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: pf9_ldap_admin
    profiles: ["dev"]   # C6: only starts with: docker compose --profile dev up
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
      PHPLDAPADMIN_HTTPS: "false"
    # Port binding added by docker-compose.override.yml for dev (auto-loaded).
    depends_on:
      - ldap
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256m

  # Operational Metering Worker
  metering_worker:
    build:
      context: ./metering_worker
    container_name: pf9_metering_worker
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      MONITORING_URL: http://pf9_monitoring:8001
      API_URL: http://pf9_api:8000
      METERING_POLL_INTERVAL: ${METERING_POLL_INTERVAL:-60}
    depends_on:
      - db
      - pf9_monitoring
      - pf9_api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time; s=os.stat('/tmp/alive'); exit(0 if time.time()-s.st_mtime < 300 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # Search Indexer Worker (Ops Assistant)
  search_worker:
    build:
      context: ./search_worker
    container_name: pf9_search_worker
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      SEARCH_INDEX_INTERVAL: ${SEARCH_INDEX_INTERVAL:-300}
    depends_on:
      - db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time; s=os.stat('/tmp/alive'); exit(0 if time.time()-s.st_mtime < 900 else 1)"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # C9: Redis — inventory/quota cache (60 s TTL by default)
  redis:
    image: redis:7-alpine
    container_name: pf9_redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 192m

  # C2: nginx TLS termination — proxies /api + /auth to pf9_api, everything else to pf9_ui
  # Generate self-signed dev certs first:  .\nginx\generate_certs.ps1
  nginx:
    build:
      context: ./nginx
    container_name: pf9_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - pf9_api
      - pf9_ui
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m

  # External LDAP / AD Identity Federation Worker
  ldap_sync_worker:
    build: ./ldap_sync_worker
    container_name: pf9_ldap_sync_worker
    restart: unless-stopped
    environment:
      PF9_DB_HOST: db
      PF9_DB_PORT: "5432"
      PF9_DB_NAME: ${POSTGRES_DB}
      PF9_DB_USER: ${POSTGRES_USER}
      PF9_DB_PASSWORD: ${POSTGRES_PASSWORD}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_PORT: "389"
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=pf9mgmt,dc=local}
      LDAP_USER_DN: ${LDAP_USER_DN:-ou=users,dc=pf9mgmt,dc=local}
      LDAP_SYNC_POLL_INTERVAL: ${LDAP_SYNC_POLL_INTERVAL:-30}
      # db_password, ldap_admin_password, and ldap_sync_key are read from /run/secrets/
      # env vars above are used in dev when secret files are empty
    secrets:
      - db_password
      - ldap_admin_password
      - ldap_sync_key
    depends_on:
      - db
      - ldap
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

volumes:
  pgdata:
  pgadmin_data:
  ldap_data:
  ldap_config:
  app_logs:
  # NFS-backed backup volume — only created when COMPOSE_PROFILES=backup
  # Requires NFS_BACKUP_SERVER and NFS_BACKUP_DEVICE to be set in .env
  nfs_backups:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NFS_BACKUP_SERVER:-},nfsvers=${NFS_VERSION:-3},nolock,soft,rw,timeo=30"
      device: ":${NFS_BACKUP_DEVICE:-}"

# ---------------------------------------------------------------------------
# Docker Secrets — optional but recommended for production.
# Create each file under ./secrets/ (which is in .gitignore).
# Example:
#   echo "supersecret" > secrets/db_password
#   echo "my-ldap-pass" > secrets/ldap_admin_password
#   echo "my-pf9-pass"  > secrets/pf9_password
#   echo "my-jwt-key"   > secrets/jwt_secret
#
# When the secret files exist the API will read them instead of the
# corresponding environment variables (see api/secret_helper.py).
# ---------------------------------------------------------------------------
secrets:
  db_password:
    file: ./secrets/db_password
  ldap_admin_password:
    file: ./secrets/ldap_admin_password
  pf9_password:
    file: ./secrets/pf9_password
  jwt_secret:
    file: ./secrets/jwt_secret
  ldap_sync_key:
    file: ./secrets/ldap_sync_key
